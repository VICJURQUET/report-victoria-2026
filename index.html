<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Impacto — Enablement Blip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
--brand-blue: #0096FA;
--blue-medium: #1968F0;
--blue-dark: #0036BD;
--navy: #202C44;
--yellow: #FFC501;
--off-white: #F5F5F5;
--gray-text: #666666;
--line: #D8D8D8;
--light-blue: #A9D6FF;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Lexend', sans-serif;
background: #FFFFFF;
color: #000;
overflow-x: hidden;
}

/* HEADER */
header {
padding: 24px 5vw 18px;
border-bottom: 1px solid var(--line);
background: #fff;
position: sticky;
top: 0;
z-index: 20;
}
header .title-row {
display: flex;
justify-content: space-between;
align-items: flex-start;
flex-wrap: wrap;
gap: 16px;
margin-bottom: 16px;
}
header .title-block h1 {
font-weight: 900;
font-size: clamp(24px, 4vw, 36px);
color: var(--navy);
letter-spacing: -0.5px;
}
header .title-block p {
font-weight: 300;
font-size: 13px;
color: var(--gray-text);
margin-top: 4px;
}
header .meta-block {
text-align: right;
font-size: 11px;
font-weight: 300;
color: var(--gray-text);
line-height: 1.6;
}
header .meta-block strong {
color: var(--blue-dark);
font-weight: 700;
}

/* FILTERS */
.filters {
display: flex;
gap: 22px;
flex-wrap: wrap;
align-items: flex-end;
}
.filter-group {
display: flex;
flex-direction: column;
gap: 6px;
}
.filter-group label {
font-size: 10px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(--gray-text);
}
.filter-pills {
display: flex;
gap: 6px;
flex-wrap: wrap;
}
.pill {
border: 1px solid var(--line);
background: #fff;
border-radius: 20px;
padding: 5px 14px;
font-size: 12px;
font-weight: 600;
color: var(--navy);
cursor: pointer;
transition: all 0.15s ease;
font-family: 'Lexend', sans-serif;
white-space: nowrap;
}
.pill:hover { border-color: var(--brand-blue); }
.pill.active {
background: linear-gradient(135deg, var(--brand-blue), var(--blue-dark));
color: #fff;
border-color: transparent;
}

/* LOADING */
.loading {
display: flex;
align-items: center;
justify-content: center;
min-height: 300px;
color: var(--gray-text);
font-size: 14px;
font-weight: 300;
}

/* MAP CANVAS (desktop) */
.map-wrap {
position: relative;
width: 100%;
min-height: 2600px;
padding: 50px 0;
background:
radial-gradient(circle at 12% 10%, rgba(0,150,250,0.04) 0%, transparent 35%),
radial-gradient(circle at 88% 55%, rgba(0,54,189,0.04) 0%, transparent 35%),
radial-gradient(circle at 20% 90%, rgba(0,150,250,0.03) 0%, transparent 35%);
}

svg.connections {
position: absolute;
top: 0; left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 1;
}
.connection-line {
stroke: #C7D0E0;
stroke-width: 1.5;
fill: none;
transition: opacity 0.2s ease, stroke-width 0.2s ease;
}
.connection-line.causal {
stroke: var(--brand-blue);
stroke-width: 1.5;
stroke-dasharray: 6 5;
opacity: 0.5;
}
.connection-line.dimmed-line {
opacity: 0.08;
}
.connection-line.highlight-line {
opacity: 1;
stroke-width: 2.5;
}
.connection-line.causal.highlight-line {
stroke: var(--blue-dark);
stroke-width: 3;
opacity: 1;
}
.connection-dot { fill: var(--light-blue); transition: opacity 0.2s ease, fill 0.2s ease, r 0.2s ease; opacity: 0.5; }
.connection-dot.dimmed-line { opacity: 0.05; }
.connection-dot.highlight-line { fill: var(--blue-dark); r: 4; opacity: 1; }

/* LEGEND */
.map-legend {
position: fixed;
bottom: 24px;
right: 24px;
background: #fff;
border: 1px solid var(--line);
border-radius: 12px;
padding: 12px 16px;
box-shadow: 0 8px 24px rgba(32,44,68,0.12);
font-size: 11px;
font-weight: 300;
color: #333;
z-index: 15;
display: flex;
flex-direction: column;
gap: 8px;
max-width: 240px;
}
.map-legend .legend-title {
font-size: 10px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
color: var(--gray-text);
margin-bottom: 2px;
}
.map-legend .legend-row {
display: flex;
align-items: center;
gap: 10px;
}
.map-legend svg {
flex-shrink: 0;
}
@media (max-width: 900px) {
.map-legend { display: none; }
}

.node {
position: absolute;
z-index: 2;
border-radius: 16px;
cursor: pointer;
transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.25s ease;
display: flex;
flex-direction: column;
justify-content: center;
text-align: left;
}
.node:hover {
transform: translateY(-5px);
box-shadow: 0 14px 30px rgba(0,54,189,0.16);
z-index: 10;
}
.node:focus-visible {
outline: 3px solid var(--brand-blue);
outline-offset: 3px;
}
.node.dimmed {
opacity: 0.15;
pointer-events: none;
}

/* TRAIL HUBS */
.node.trail {
width: 220px;
min-height: 100px;
padding: 18px 20px;
background: linear-gradient(135deg, var(--brand-blue), var(--blue-dark));
color: #fff;
box-shadow: 0 8px 24px rgba(0,54,189,0.2);
}
.node.trail .eyebrow {
font-size: 10px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1.5px;
opacity: 0.75;
margin-bottom: 6px;
}
.node.trail h3 {
font-size: 15px;
font-weight: 700;
line-height: 1.25;
}
.node.trail .count {
margin-top: 8px;
font-size: 11px;
font-weight: 300;
opacity: 0.85;
}
.node.trail.overview {
width: 260px;
min-height: 180px;
padding: 24px 26px;
justify-content: space-between;
}
.node.trail.overview h3 {
font-size: 19px;
}
.node.trail.overview .count {
font-size: 13px;
margin-top: 16px;
}

/* PROJECT NODES */
.node.project {
width: 195px;
min-height: 96px;
padding: 14px 16px;
background: #FFFFFF;
border: 1px solid #ECEFF4;
box-shadow: 0 4px 14px rgba(32,44,68,0.06);
}
.node.project h4 {
font-size: 12.5px;
font-weight: 700;
color: var(--navy);
line-height: 1.3;
margin-bottom: 8px;
}
.node-meta {
display: flex;
gap: 5px;
flex-wrap: wrap;
align-items: center;
}
.status {
font-size: 9.5px;
font-weight: 600;
display: inline-flex;
align-items: center;
gap: 4px;
padding: 2px 8px;
border-radius: 20px;
white-space: nowrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status.live { background: #E8F7EE; color: #1E8E4F; }
.status.live .status-dot { background: #1E8E4F; }
.status.progress { background: #EAF2FE; color: var(--blue-medium); }
.status.progress .status-dot { background: var(--blue-medium); }

.tag {
font-size: 9px;
font-weight: 700;
padding: 2px 8px;
border-radius: 20px;
background: var(--off-white);
color: var(--blue-dark);
white-space: nowrap;
}
.tag.blip20 {
background: linear-gradient(135deg, var(--brand-blue), var(--blue-dark));
color: #fff;
}

/* MOBILE LIST */
.mobile-list { display: none; }
.mobile-trail-group { margin: 0 5vw 32px; }
.mobile-trail-group h2 {
font-size: 15px;
font-weight: 700;
color: #fff;
background: linear-gradient(135deg, var(--brand-blue), var(--blue-dark));
padding: 14px 18px;
border-radius: 12px;
margin-bottom: 12px;
}
.mobile-trail-group .mobile-card {
background: #fff;
border: 1px solid #ECEFF4;
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 10px;
box-shadow: 0 4px 14px rgba(32,44,68,0.06);
cursor: pointer;
}
.mobile-card h4 {
font-size: 13px;
font-weight: 700;
color: var(--navy);
margin-bottom: 8px;
}

@media (max-width: 900px) {
.map-wrap { display: none; }
.mobile-list { display: block; padding: 24px 0; }
.filters { gap: 14px; }
.filter-pills { gap: 5px; }
.pill { font-size: 11px; padding: 4px 11px; }
header .meta-block { display: none; }
}

/* MODAL */
.overlay {
position: fixed;
inset: 0;
background: rgba(32,44,68,0.55);
backdrop-filter: blur(2px);
display: flex;
align-items: center;
justify-content: center;
z-index: 100;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease;
padding: 20px;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.modal {
background: #fff;
width: min(640px, 100%);
max-height: 88vh;
overflow-y: auto;
border-radius: 16px;
box-shadow: 0 24px 60px rgba(0,0,0,0.25);
transform: translateY(20px) scale(0.98);
transition: transform 0.25s ease;
}
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal-header {
background: linear-gradient(135deg, var(--brand-blue), var(--blue-dark));
color: #fff;
padding: 26px 30px;
border-radius: 16px 16px 0 0;
position: relative;
}
.modal-header .trail-tag {
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1.5px;
opacity: 0.8;
margin-bottom: 8px;
}
.modal-header h2 { font-size: 22px; font-weight: 700; line-height: 1.3; }
.modal-close {
position: absolute;
top: 18px;
right: 22px;
background: rgba(255,255,255,0.15);
border: none;
color: #fff;
width: 32px;
height: 32px;
border-radius: 50%;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.15s ease;
}
.modal-close:hover { background: rgba(255,255,255,0.3); }
.modal-body { padding: 26px 30px; }
.modal-body .status { margin-bottom: 16px; font-size: 11px; padding: 4px 10px; }
.modal-body .status-dot { width: 7px; height: 7px; }

.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.modal-tags .tag { font-size: 10px; padding: 4px 10px; }

.modal-section { margin-bottom: 20px; }
.modal-section h5 {
font-size: 11px;
font-weight: 700;
color: var(--blue-dark);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 8px;
}
.modal-section p {
font-size: 13.5px;
font-weight: 300;
line-height: 1.6;
color: #1a1a1a;
}

.stat-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
gap: 10px;
}
.stat-card {
background: var(--off-white);
border-radius: 10px;
padding: 12px;
text-align: center;
}
.stat-card .num {
font-size: 20px;
font-weight: 900;
color: var(--brand-blue);
line-height: 1.1;
}
.stat-card .label {
font-size: 10px;
font-weight: 300;
color: var(--gray-text);
margin-top: 4px;
line-height: 1.3;
}

.links-list { list-style: none; }
.links-list li {
font-size: 12.5px;
padding: 6px 0;
border-bottom: 1px solid var(--off-white);
color: var(--blue-dark);
font-weight: 600;
}
.links-list li:last-child { border-bottom: none; }

.tools-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-chip {
font-size: 11px;
font-weight: 600;
padding: 4px 12px;
border-radius: 20px;
background: var(--off-white);
color: var(--navy);
border: 1px solid var(--line);
}

.related-links { display: flex; flex-wrap: wrap; gap: 8px; }
.related-chip {
background: var(--off-white);
border: 1px solid var(--line);
border-radius: 12px;
padding: 8px 14px;
font-size: 12px;
font-weight: 600;
color: var(--blue-dark);
cursor: pointer;
transition: background 0.15s ease;
font-family: 'Lexend', sans-serif;
text-align: left;
max-width: 100%;
}
.related-chip:hover { background: #EAF2FE; }
.related-chip .reason {
display: block;
font-size: 10px;
font-weight: 300;
color: var(--gray-text);
margin-top: 3px;
line-height: 1.4;
}

.timeline { list-style: none; }
.timeline li {
position: relative;
padding-left: 20px;
padding-bottom: 16px;
border-left: 2px solid var(--off-white);
margin-left: 4px;
}
.timeline li:last-child { border-left: 2px solid transparent; padding-bottom: 0; }
.timeline li::before {
content: '';
position: absolute;
left: -5px; top: 4px;
width: 8px; height: 8px;
border-radius: 50%;
background: var(--brand-blue);
}
.timeline .tl-date {
font-size: 10px; font-weight: 600; color: var(--gray-text);
text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
}
.timeline .tl-text { font-size: 13px; font-weight: 300; line-height: 1.5; }

@media (prefers-reduced-motion: reduce) {
* { transition: none !important; }
}
</style>
</head>
<body>

<header>
<div class="title-row">
<div class="title-block">
<h1 id="portalTitle">Portal de Impacto</h1>
<p id="portalSubtitle">Revenue Enablement · Blip</p>
</div>
<div class="meta-block" id="metaBlock"></div>
</div>
<div class="filters">
<div class="filter-group">
<label>Trilha</label>
<div class="filter-pills" id="trailFilters"></div>
</div>
<div class="filter-group">
<label>Status</label>
<div class="filter-pills" id="statusFilters"></div>
</div>
<div class="filter-group">
<label>Período</label>
<div class="filter-pills" id="periodFilters"></div>
</div>
</div>
</header>

<div class="loading" id="loadingMsg">Carregando portal...</div>

<div class="map-wrap" id="mapWrap" style="display:none;">
<svg class="connections" id="connections"></svg>
</div>

<div class="map-legend" id="mapLegend" style="display:none;">
<div class="legend-title">Legenda das conexões</div>
<div class="legend-row">
<svg width="36" height="10" viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="#C7D0E0" stroke-width="1.5"/></svg>
<span>Linha contínua cinza — projeto pertence à trilha</span>
</div>
<div class="legend-row">
<svg width="36" height="10" viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="#0096FA" stroke-width="2" stroke-dasharray="6 5"/><circle cx="18" cy="5" r="2.5" fill="#0096FA"/></svg>
<span>Linha tracejada azul — conexão entre projetos (mais destacada ao passar o mouse)</span>
</div>
</div>

<div class="mobile-list" id="mobileList"></div>

<div class="overlay" id="overlay">
<div class="modal" id="modal"></div>
</div>

<script>
// ============================================
// DATA LOADING
// data.json fica em arquivo separado — editar lá para
// adicionar projetos, mudar status, registrar resultados etc.
// ============================================
let DATA = null;
let activeFilters = { trail: 'all', status: 'all', period: 'all' };

const mapWrap = document.getElementById('mapWrap');
const svg = document.getElementById('connections');
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');
const mobileList = document.getElementById('mobileList');
const loadingMsg = document.getElementById('loadingMsg');

function getProject(id) { return DATA.projects.find(p => p.id === id); }
function getTrail(id) { return DATA.trails.find(t => t.id === id); }

// ============================================
// LAYOUT — posições calculadas automaticamente
// (trilha em coluna à esquerda, projetos em grid à direita)
// ============================================
function computeLayout() {
if (activeFilters.trail !== 'all') {
// FOCUSED LAYOUT: trail in corner, projects scattered in a "cloud" to the right
const trail = getTrail(activeFilters.trail);
const trailX = 40;
const trailY = 60;
trail.x = trailX;
trail.y = trailY;

const cloudCenterX = 620;
const cloudCenterY = trailY + 140;
const projW = 195, projH = 96;

// pseudo-random but deterministic per project id, so layout is stable across re-renders
function seedFor(id) {
let h = 0;
for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
return h;
}

const n = trail.projects.length;
trail.projects.forEach((pid, pi) => {
const project = getProject(pid);
const seed = seedFor(pid);

// distribute around a circle, with radius growing for outer "rings"
const ring = Math.floor(pi / 6);
const idxInRing = pi % 6;
const ringCount = Math.min(6, n - ring * 6);
const angle = (idxInRing / Math.max(1, ringCount)) * Math.PI * 2 + (ring * 0.5);
const baseRadius = 280 + ring * 320;

// jitter based on seed, deterministic
const jitterX = ((seed % 100) / 100 - 0.5) * 140;
const jitterY = (((seed >> 8) % 100) / 100 - 0.5) * 140;
const radiusJitter = ((seed >> 16) % 100) / 100 * 80;

const radius = baseRadius + radiusJitter;
project.x = Math.max(280, cloudCenterX + Math.cos(angle) * radius * 1.3 + jitterX - projW / 2);
project.y = Math.max(0, cloudCenterY + Math.sin(angle) * radius * 0.7 + jitterY - projH / 2);
});

// adjust map height/width based on the furthest project
let maxY = trailY + 400;
trail.projects.forEach(pid => {
const project = getProject(pid);
maxY = Math.max(maxY, project.y + projH + 120);
});
mapWrap.style.minHeight = maxY + 'px';
return;
}

// OVERVIEW LAYOUT: only trail cards, in a simple grid spread across the canvas
const cardW = 260;
const cardH = 180;
const gapX = 40;
const gapY = 40;
const cols = 3;
const startX = 40;
const startY = 40;

DATA.trails.forEach((trail, ti) => {
const col = ti % cols;
const row = Math.floor(ti / cols);
trail.x = startX + col * (cardW + gapX);
trail.y = startY + row * (cardH + gapY);
});

const rows = Math.ceil(DATA.trails.length / cols);
const totalHeight = startY + rows * (cardH + gapY) + 100;
mapWrap.style.minHeight = totalHeight + 'px';
}

// ============================================
// FILTERS UI
// ============================================
function buildFilters() {
const trailFilters = document.getElementById('trailFilters');
const statusFilters = document.getElementById('statusFilters');
const periodFilters = document.getElementById('periodFilters');
trailFilters.innerHTML = '';
statusFilters.innerHTML = '';
periodFilters.innerHTML = '';

const makePill = (id, label, key) => {
const p = document.createElement('button');
p.className = 'pill' + (activeFilters[key] === id ? ' active' : '');
p.textContent = label;
p.onclick = () => { activeFilters[key] = id; render(); };
return p;
};

trailFilters.appendChild(makePill('all', 'Todas', 'trail'));
DATA.trails.forEach(t => trailFilters.appendChild(makePill(t.id, t.name, 'trail')));

statusFilters.appendChild(makePill('all', 'Todos', 'status'));
statusFilters.appendChild(makePill('live', 'Done', 'status'));
statusFilters.appendChild(makePill('progress', 'Em andamento', 'status'));

const periods = ['all', 'Q1', 'Q2', 'Q3', 'Q4', 'Anual'];
periods.forEach(p => periodFilters.appendChild(makePill(p, p === 'all' ? 'Todos' : p, 'period')));
}

function matchesFilters(project) {
if (activeFilters.trail !== 'all' && project.trailId !== activeFilters.trail) return false;
if (activeFilters.status !== 'all' && project.status !== activeFilters.status) return false;
if (activeFilters.period !== 'all' && project.period !== activeFilters.period) return false;
return true;
}

// ============================================
// DESKTOP MAP RENDER
// ============================================
function renderMap() {
mapWrap.querySelectorAll('.node').forEach(n => n.remove());

DATA.trails.forEach(trail => {
if (activeFilters.trail !== 'all' && activeFilters.trail !== trail.id) return;

const el = document.createElement('div');
el.className = 'node trail';
if (activeFilters.trail === 'all') el.classList.add('overview');
el.style.left = trail.x + 'px';
el.style.top = trail.y + 'px';
el.tabIndex = 0;
el.dataset.connKey = 'trail_' + trail.id;

const visibleProjects = trail.projects.filter(pid => matchesFilters(getProject(pid)));
if (visibleProjects.length === 0 && (activeFilters.status !== 'all' || activeFilters.period !== 'all')) {
el.classList.add('dimmed');
}

el.innerHTML = `
<div class="eyebrow">Trilha</div>
<h3>${trail.name}</h3>
<div class="count">${trail.projects.length} projeto${trail.projects.length > 1 ? 's' : ''}</div>
`;

if (activeFilters.trail === 'all') {
el.addEventListener('click', () => { activeFilters.trail = trail.id; render(); });
el.addEventListener('keydown', e => { if (e.key === 'Enter') { activeFilters.trail = trail.id; render(); } });
} else {
el.addEventListener('click', () => openTrailModal(trail));
el.addEventListener('keydown', e => { if (e.key === 'Enter') openTrailModal(trail); });
}
el.addEventListener('mouseenter', () => highlightConnections(el.dataset.connKey));
el.addEventListener('mouseleave', () => clearHighlight());
mapWrap.appendChild(el);
});

if (activeFilters.trail === 'all') { drawConnections(); return; }

DATA.projects.forEach(project => {
if (activeFilters.trail !== 'all' && project.trailId !== activeFilters.trail) return;

const el = document.createElement('div');
el.className = 'node project';
el.style.left = project.x + 'px';
el.style.top = project.y + 'px';
el.tabIndex = 0;
el.dataset.connKey = 'proj_' + project.id;

if (!matchesFilters(project)) el.classList.add('dimmed');

const tagsHTML = (project.tags || []).map(t =>
`<span class="tag ${t === 'Blip 2.0' ? 'blip20' : ''}">${t}</span>`
).join('');

el.innerHTML = `
<h4>${project.name}</h4>
<div class="node-meta">
<span class="status ${project.status}"><span class="status-dot"></span>${project.statusLabel}</span>
${tagsHTML}
</div>
`;
el.addEventListener('click', () => openProjectModal(project.id));
el.addEventListener('keydown', e => { if (e.key === 'Enter') openProjectModal(project.id); });
el.addEventListener('mouseenter', () => highlightConnections(el.dataset.connKey));
el.addEventListener('mouseleave', () => clearHighlight());
mapWrap.appendChild(el);
});

drawConnections();
}

function drawConnections() {
svg.innerHTML = '';
const wrapRect = mapWrap.getBoundingClientRect();
svg.setAttribute('viewBox', `0 0 ${wrapRect.width} ${wrapRect.height}`);

// arrow marker for causal connections
const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
defs.innerHTML = `
<marker id="arrowHead" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto-start-reverse">
<path d="M0,0 L8,4 L0,8 Z" fill="var(--brand-blue)"></path>
</marker>
<marker id="arrowHeadActive" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto-start-reverse">
<path d="M0,0 L8,4 L0,8 Z" fill="var(--blue-dark)"></path>
</marker>
`;
svg.appendChild(defs);

function center(el) {
const r = el.getBoundingClientRect();
return { x: r.left - wrapRect.left + r.width / 2, y: r.top - wrapRect.top + r.height / 2 };
}

const allNodes = document.querySelectorAll('.node');
const nodeMap = {};
allNodes.forEach(n => {
nodeMap[n.dataset.connKey] = n;
});

// trail -> project (structural)
DATA.trails.forEach(trail => {
trail.projects.forEach(pid => {
const a = nodeMap['trail_' + trail.id];
const b = nodeMap['proj_' + pid];
if (!a || !b) return;
const c1 = center(a), c2 = center(b);
const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
line.setAttribute('x1', c1.x); line.setAttribute('y1', c1.y);
line.setAttribute('x2', c2.x); line.setAttribute('y2', c2.y);
line.setAttribute('class', 'connection-line');
line.dataset.a = 'trail_' + trail.id;
line.dataset.b = 'proj_' + pid;
svg.appendChild(line);
});
});

// project <-> project (causal / usage)
const drawn = new Set();
let causalIdx = 0;
DATA.projects.forEach(project => {
(project.relatedTo || []).forEach(rel => {
const key = [project.id, rel.id].sort().join('-');
if (drawn.has(key)) return;
drawn.add(key);
const a = nodeMap['proj_' + project.id];
const b = nodeMap['proj_' + rel.id];
if (!a || !b) return;
const c1 = center(a), c2 = center(b);

// shorten the end slightly so the arrowhead doesn't sit under the card
const dx = c2.x - c1.x, dy = c2.y - c1.y;
const dist = Math.sqrt(dx * dx + dy * dy) || 1;
const shorten = 14;
const ex = c2.x - (dx / dist) * shorten;
const ey = c2.y - (dy / dist) * shorten;

// curve the path via a perpendicular offset on the control point,
// alternating sides so overlapping connections fan out instead of stacking
const mx = (c1.x + ex) / 2;
const my = (c1.y + ey) / 2;
const nx = -dy / dist;
const ny = dx / dist;
const side = causalIdx % 2 === 0 ? 1 : -1;
const bend = Math.min(60, 25 + (causalIdx % 3) * 15) * side;
const cx = mx + nx * bend;
const cy = my + ny * bend;
causalIdx++;

const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
path.setAttribute('d', `M ${c1.x} ${c1.y} Q ${cx} ${cy} ${ex} ${ey}`);
path.setAttribute('class', 'connection-line causal');
path.setAttribute('marker-end', 'url(#arrowHead)');
path.dataset.a = 'proj_' + project.id;
path.dataset.b = 'proj_' + rel.id;
svg.appendChild(path);

const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
circle.setAttribute('cx', cx);
circle.setAttribute('cy', cy);
circle.setAttribute('r', 3);
circle.setAttribute('class', 'connection-dot');
circle.dataset.a = 'proj_' + project.id;
circle.dataset.b = 'proj_' + rel.id;
svg.appendChild(circle);
});
});
}

// ============================================
// CONNECTION HIGHLIGHT (hover)
// ============================================
function highlightConnections(key) {
const lines = svg.querySelectorAll('.connection-line, .connection-dot');
lines.forEach(el => {
const related = el.dataset.a === key || el.dataset.b === key;
el.classList.toggle('highlight-line', related);
el.classList.toggle('dimmed-line', !related);
if (el.classList.contains('causal') && el.tagName === 'path') {
el.setAttribute('marker-end', related ? 'url(#arrowHeadActive)' : 'url(#arrowHead)');
}
});
}

function clearHighlight() {
const lines = svg.querySelectorAll('.connection-line, .connection-dot');
lines.forEach(el => {
el.classList.remove('highlight-line', 'dimmed-line');
if (el.classList.contains('causal') && el.tagName === 'path') {
el.setAttribute('marker-end', 'url(#arrowHead)');
}
});
}

// ============================================
// MOBILE LIST RENDER
// ============================================
function renderMobile() {
mobileList.innerHTML = '';
DATA.trails.forEach(trail => {
const visibleProjects = trail.projects.filter(pid => matchesFilters(getProject(pid)));
if (activeFilters.trail !== 'all' && activeFilters.trail !== trail.id) return;
if (visibleProjects.length === 0) return;

const group = document.createElement('div');
group.className = 'mobile-trail-group';
group.innerHTML = `<h2>${trail.name}</h2>`;

visibleProjects.forEach(pid => {
const project = getProject(pid);
const tagsHTML = (project.tags || []).map(t => `<span class="tag ${t === 'Blip 2.0' ? 'blip20' : ''}">${t}</span>`).join('');
const card = document.createElement('div');
card.className = 'mobile-card';
card.innerHTML = `
<h4>${project.name}</h4>
<div class="node-meta">
<span class="status ${project.status}"><span class="status-dot"></span>${project.statusLabel}</span>
${tagsHTML}
</div>
`;
card.addEventListener('click', () => openProjectModal(project.id));
group.appendChild(card);
});

mobileList.appendChild(group);
});
}

// ============================================
// MODALS
// ============================================
function openProjectModal(id) {
const project = getProject(id);
const trail = getTrail(project.trailId);

const tagsHTML = (project.tags || []).map(t => `<span class="tag ${t === 'Blip 2.0' ? 'blip20' : ''}">${t}</span>`).join('');

const statsHTML = (project.stats || []).map(s => `
<div class="stat-card">
<div class="num">${s.num}</div>
<div class="label">${s.label}</div>
</div>
`).join('');

const linksHTML = (project.links || []).map(l => `<li>${l}</li>`).join('');

const toolsHTML = (project.tools || []).map(t => `<span class="tool-chip">${t}</span>`).join('');

const relatedHTML = (project.relatedTo || []).map(rel => {
const r = getProject(rel.id);
if (!r) return '';
return `<button class="related-chip" onclick="openProjectModal('${r.id}')">${r.name}<span class="reason">${rel.reason}</span></button>`;
}).join('');

const timelineHTML = (project.timeline || []).map(t => `
<li><div class="tl-date">${t.date}</div><div class="tl-text">${t.text}</div></li>
`).join('');

modal.innerHTML = `
<div class="modal-header">
<div class="trail-tag">${trail.name}</div>
<h2>${project.name}</h2>
<button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button>
</div>
<div class="modal-body">
<span class="status ${project.status}"><span class="status-dot"></span>${project.statusLabel} · ${project.period}</span>
${tagsHTML ? `<div class="modal-tags">${tagsHTML}</div>` : ''}

<div class="modal-section">
<h5>Público-alvo</h5>
<p>${project.publico || '—'}</p>
</div>
<div class="modal-section">
<h5>Contexto</h5>
<p>${project.contexto || '—'}</p>
</div>
<div class="modal-section">
<h5>Objetivo</h5>
<p>${project.objetivo || '—'}</p>
</div>
${statsHTML ? `
<div class="modal-section">
<h5>KR Alvo / Entregáveis e Impactos</h5>
<div class="stat-grid">${statsHTML}</div>
</div>` : ''}
${linksHTML ? `
<div class="modal-section">
<h5>Materiais / Links</h5>
<ul class="links-list">${linksHTML}</ul>
</div>` : ''}
${toolsHTML ? `
<div class="modal-section">
<h5>Ferramentas Utilizadas</h5>
<div class="tools-row">${toolsHTML}</div>
</div>` : ''}
${timelineHTML ? `
<div class="modal-section">
<h5>Linha do tempo</h5>
<ul class="timeline">${timelineHTML}</ul>
</div>` : ''}
${relatedHTML ? `
<div class="modal-section">
<h5>Projetos conectados</h5>
<div class="related-links">${relatedHTML}</div>
</div>` : ''}
</div>
`;
overlay.classList.add('open');
}

function openTrailModal(trail) {
const projectsHTML = trail.projects.map(pid => {
const proj = getProject(pid);
return `<button class="related-chip" onclick="openProjectModal('${proj.id}')">${proj.name}</button>`;
}).join('');

modal.innerHTML = `
<div class="modal-header">
<div class="trail-tag">Trilha</div>
<h2>${trail.name}</h2>
<button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button>
</div>
<div class="modal-body">
<div class="modal-section">
<h5>Projetos desta trilha</h5>
<div class="related-links">${projectsHTML}</div>
</div>
</div>
`;
overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================
// INIT
// ============================================
function render() {
buildFilters();
computeLayout();
renderMap();
renderMobile();
document.getElementById('mapLegend').style.display = activeFilters.trail === 'all' ? 'none' : '';
}

async function init() {
try {
const res = await fetch('data.json');
if (!res.ok) throw new Error('Falha ao carregar data.json');
DATA = await res.json();
} catch (err) {
loadingMsg.textContent = 'Erro ao carregar data.json. Verifique se o arquivo está na mesma pasta do index.html.';
console.error(err);
return;
}

// header meta
document.getElementById('portalTitle').textContent = DATA.meta?.title || 'Portal de Impacto';
document.getElementById('portalSubtitle').textContent = DATA.meta?.subtitle || '';
document.getElementById('metaBlock').innerHTML = `
Responsável: <strong>${DATA.meta?.author || ''}</strong><br>
Última atualização: <strong>${DATA.meta?.lastUpdate || ''}</strong>
`;

computeLayout();
loadingMsg.style.display = 'none';
mapWrap.style.display = '';

render();
window.addEventListener('resize', drawConnections);
}

init();
</script>
